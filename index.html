<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de pessoas</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/vue@3"></script>
</head>
<body>
    <div id="app">

        <h1>Sistema de cadastro de pessoas</h1>

        <form @submit.prevent="cadastrarPessoa">

        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" v-model="nome" required>
        </div>
            

        <div>
            <label for="email">E-mail</label>
            <input type="email" id="email" v-model="email" required>
        </div>    
            
        <div>
            <label for="dataNasc">Data de Nascimento</label>
            <input type="date" min="1900-01-01" max="2026-03-31" id="dataNasc" v-model="dataNasc" required>
        </div>    
            
        <div>
            <label for="CPF">CPF</label>
            <input type="text" id="CPF" v-model="CPF" required>
        </div>    
            
        <div>
            <label for="senha">Senha</label>
            <input type="password" id="senha" v-model="senha" required>
        </div>
            
        <button type="submit">Cadastrar</button>

        </form>

        <div class="resultado" v-if="mostrar">
            <h2>Usuário cadastrado com sucesso!</h2>
            <p>Nome: {{ nome }}</p>
            <p>E-mail: {{ email }}</p>
        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
